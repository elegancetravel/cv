    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            overflow-x: hidden;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes floatReverse {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(20px) rotate(-5deg);
            }
        }

        @keyframes pulse-glow {

            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }

        @keyframes gradient-shift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes particle-float {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        .floating-reverse {
            animation: floatReverse 6s ease-in-out infinite;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: particle-float 15s linear infinite;
        }

        .hover-3d {
            transition: transform 0.3s ease;
            transform-style: preserve-3d;
        }

        /* Base Reveal Class */
        .reveal-base {
            transition: all 0.8s cubic-bezier(0.5, 0, 0, 1);
            opacity: 0;
            will-change: transform, opacity;
        }

        /* Slide Up (Default) */
        .reveal-up {
            transform: translateY(50px);
        }

        .reveal-up.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Slide From Left */
        .reveal-left {
            transform: translateX(-50px);
        }

        .reveal-left.active {
            opacity: 1;
            transform: translateX(0);
        }

        /* Slide From Right */
        .reveal-right {
            transform: translateX(50px);
        }

        .reveal-right.active {
            opacity: 1;
            transform: translateX(0);
        }

        /* Zoom In */
        .reveal-zoom {
            transform: scale(0.8);
        }

        .reveal-zoom.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Rotate In */
        .reveal-rotate {
            transform: rotate(-5deg) scale(0.9);
        }

        .reveal-rotate.active {
            opacity: 1;
            transform: rotate(0) scale(1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        @keyframes gentle-float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* Continuous float for all cards */
        .glass-card {
            animation: gentle-float 6s ease-in-out infinite;
            will-change: transform;
        }

        .gradient-text {
            background: linear-gradient(135deg, #ff0080, #8000ff, #00bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-bg {
            background: linear-gradient(-45deg, #ff0080, #8000ff, #00bfff, #ff0080);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
        }
        /* Animación de entrada suave */
        @keyframes fadeInPage {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-loading {
            opacity: 0;
        }

        .page-loaded {
            animation: fadeInPage 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        /* Botón Guardar Contacto */
        .save-contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #ff0080, #8000ff);
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 40px rgba(255, 0, 128, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .save-contact-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(255, 0, 128, 0.6);
        }

        .save-contact-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
    </style>
</head>

        function init3DHover() {

                    const rect = el.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (y - centerY) / 10;
                    const rotateY = (centerX - x) / 10;
                    el.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(20px)`;
                });
                el.addEventListener('mouseleave', () => {
                    el.style.transform = '';
                });
            });
        }

                        // Remove active class to reset animation when out of view
                        entry.target.classList.remove('active');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal-base').forEach(el => observer.observe(el));

            const modal = document.getElementById('cv-modal');
            const content = document.getElementById('cv-modal-content');
            modal.classList.add('opacity-0', 'pointer-events-none');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            document.body.style.overflow = '';
        }

        // Close on click outside
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('cv-modal');
            if (e.target === modal) {
                closeCVModal();
            }
        });

        // Ejecutar el nuevo renderizado inmediatamente
        renderContent();

        // --- ANIMACIÓN DE ENTRADA SUAVE ---
        window.addEventListener('DOMContentLoaded', () => {
            document.body.classList.remove('page-loading');
            document.body.classList.add('page-loaded');
        });
        // Fallback si DOMContentLoaded ya pasó
        if (document.readyState !== 'loading') {
            document.body.classList.remove('page-loading');
            document.body.classList.add('page-loaded');
        }

        // --- SISTEMA DE ESTADÍSTICAS DE VISITAS ---
        (function() {
            // Detectar fuente de la visita por parámetro URL
            const urlParams = new URLSearchParams(window.location.search);
            const source = urlParams.get('source') || 'web'; // 'qr', 'nfc', o 'web'

            // Claves en localStorage
            const STATS_KEY = 'visitStats';

            // Obtener estadísticas actuales
            function getStats() {
                try {
                    return JSON.parse(localStorage.getItem(STATS_KEY)) || { web: 0, qr: 0, nfc: 0, total: 0 };
                } catch(e) {
                    return { web: 0, qr: 0, nfc: 0, total: 0 };
                }
            }

            // Registrar visita
            const stats = getStats();
            if (source === 'qr' || source === 'nfc' || source === 'web') {
                stats[source] = (stats[source] || 0) + 1;
            } else {
                stats.web = (stats.web || 0) + 1;
            }
            stats.total = (stats.total || 0) + 1;
            localStorage.setItem(STATS_KEY, JSON.stringify(stats));

            // Enviar evento a Google Analytics (cuando se configure el ID)
            if (typeof gtag === 'function') {
                gtag('event', 'page_visit', {
                    'visit_source': source,
                    'event_category': 'tarjeta_digital',
                    'event_label': 'Visita desde ' + source.toUpperCase()
                });
            }

            // Función global para consultar estadísticas desde la consola
            window.getVisitStats = function() {
                const currentStats = getStats();
                console.log('📊 Estadísticas de Visitas:');
                console.log('   🌐 Web directa:', currentStats.web);
                console.log('   📱 Código QR:', currentStats.qr);
                console.log('   📡 NFC:', currentStats.nfc);
                console.log('   📈 Total:', currentStats.total);
                return currentStats;
            };

            console.log('✅ Sistema de estadísticas activo. Fuente detectada:', source.toUpperCase());
            console.log('💡 Escribe getVisitStats() en la consola para ver las estadísticas.');
        })();
    </script>
</body>
